# 駆け出し向けタグの新着記事をストック（1日1回・制限内）
# 目安: 1日20〜30件・いいねと同様に控えめに → 1日1回で最大20件・120秒間隔

name: Stock Items

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC = 13:00 JST（いいねの1時間後）
  workflow_dispatch:

jobs:
  stock:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: qiita-auto-core をチェックアウト
        uses: actions/checkout@v4
        with:
          repository: aa-0921/qiita-auto-core
          path: qiita-auto-core
          ref: main
          token: ${{ secrets.CORE_REPO_TOKEN }}

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 依存パッケージをインストール
        run: |
          cd qiita-auto-core && npm install
          cd ..
          npm install ./qiita-auto-core

      - name: 環境変数を設定
        run: |
          echo "QIITA_ACCESS_TOKEN=${{ secrets.QIITA_ACCESS_TOKEN }}" >> $GITHUB_ENV

      - name: ストックスクリプトを実行
        run: node scripts/stockItems.js
