# 自分の Qiita 記事のいいね・ストック数を取得し、ログに出力する
# 週1回（月曜 0:00 UTC = 月曜 9:00 JST）実行

name: Analyze My Items

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: qiita-auto-core をチェックアウト
        uses: actions/checkout@v4
        with:
          repository: aa-0921/qiita-auto-core
          path: qiita-auto-core
          ref: main
          token: ${{ secrets.CORE_REPO_TOKEN }}

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 依存パッケージをインストール
        run: |
          cd qiita-auto-core && npm install
          cd ..
          npm install ./qiita-auto-core

      - name: 環境変数を設定
        run: |
          echo "QIITA_ACCESS_TOKEN=${{ secrets.QIITA_ACCESS_TOKEN }}" >> $GITHUB_ENV

      - name: 記事分析スクリプトを実行
        run: node scripts/analyzeMyItems.js
